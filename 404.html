<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>404 - Page Not Found</title>
<meta name="description" content="Page not found — Sanjay Karki, Server Administrator">
<link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 32 32'><rect width='32' height='32' fill='%230c0c0e'/><text x='50%25' y='54%25' dominant-baseline='middle' text-anchor='middle' font-family='monospace' font-size='18' font-weight='bold' fill='%23e8c97a'>SK</text></svg>">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;500;600;700;800&family=DM+Mono:wght@300;400;500&family=Lora:ital,wght@0,400;0,500;1,400&display=swap" rel="stylesheet">
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{
  --bg:#0c0c0e;--bg2:#111114;
  --border:rgba(255,255,255,0.07);--border2:rgba(255,255,255,0.14);--border3:rgba(255,255,255,0.22);
  --text:#f0ede8;--muted:#8a8a96;--subtle:#5a5a66;
  --accent:#e8c97a;--accent2:#7ab4e8;--green:#7ae8b4;--pink:#e87a9a;
}
html{scroll-behavior:smooth}
body{
  background:var(--bg);color:var(--text);font-family:'Syne',sans-serif;
  line-height:1.6;overflow:hidden;height:100svh;
  display:flex;align-items:center;justify-content:center;
}

/* background orbs */
.bg-wrap{position:fixed;inset:0;pointer-events:none;overflow:hidden;z-index:0}
.orb{position:absolute;border-radius:50%;filter:blur(80px);opacity:.1}
.orb1{width:600px;height:600px;background:var(--accent);top:-20%;right:-10%;animation:drift1 12s ease-in-out infinite alternate}
.orb2{width:400px;height:400px;background:var(--accent2);bottom:0%;left:-10%;animation:drift2 15s ease-in-out infinite alternate}
.orb3{width:250px;height:250px;background:var(--pink);top:50%;left:40%;animation:drift3 10s ease-in-out infinite alternate}
@keyframes drift1{from{transform:translate(0,0)}to{transform:translate(-40px,40px)}}
@keyframes drift2{from{transform:translate(0,0)}to{transform:translate(50px,-30px)}}
@keyframes drift3{from{transform:translate(0,0)}to{transform:translate(-30px,50px)}}
.scanlines{position:fixed;inset:0;z-index:1;pointer-events:none;background:repeating-linear-gradient(0deg,transparent,transparent 2px,rgba(0,0,0,.03) 2px,rgba(0,0,0,.03) 4px)}

/* main layout */
main{position:relative;z-index:2;padding:2rem;width:100%}
.container{display:grid;grid-template-columns:1fr 1fr;gap:6rem;align-items:center;max-width:1100px;margin:0 auto}

/* left */
.eyebrow{font-family:'DM Mono',monospace;font-size:11px;color:var(--accent);letter-spacing:.22em;text-transform:uppercase;margin-bottom:1.5rem;display:flex;align-items:center;gap:.75rem;opacity:0;animation:fadeUp .6s ease .1s forwards}
.eyebrow::before{content:'';display:block;width:28px;height:1px;background:var(--accent)}

.big404{font-size:clamp(100px,16vw,180px);font-weight:800;line-height:.85;letter-spacing:-.04em;margin-bottom:1.5rem;color:transparent;-webkit-text-stroke:1.5px rgba(232,201,122,.25);position:relative;opacity:0;animation:fadeUp .7s ease .2s forwards;user-select:none}
.big404-fill{position:absolute;inset:0;background:linear-gradient(135deg,var(--accent) 0%,rgba(232,201,122,.15) 60%);-webkit-background-clip:text;background-clip:text;color:transparent;-webkit-text-stroke:0;animation:shimmer 4s ease-in-out infinite}
@keyframes shimmer{0%,100%{opacity:.2}50%{opacity:.55}}

.headline{font-size:clamp(24px,3.5vw,40px);font-weight:800;letter-spacing:-.025em;line-height:1.1;margin-bottom:1rem;opacity:0;animation:fadeUp .7s ease .3s forwards}
.headline em{font-style:normal;color:var(--accent)}

.sub{font-family:'Lora',serif;font-size:16px;color:var(--muted);font-style:italic;line-height:1.8;max-width:400px;margin-bottom:2.5rem;opacity:0;animation:fadeUp .7s ease .4s forwards}

.actions{display:flex;gap:1rem;flex-wrap:wrap;opacity:0;animation:fadeUp .7s ease .5s forwards}
.btn1{padding:.8rem 1.8rem;background:var(--accent);color:var(--bg);font-family:'DM Mono',monospace;font-size:11px;font-weight:500;letter-spacing:.1em;text-decoration:none;transition:all .22s;display:inline-flex;align-items:center;gap:.5rem}
.btn1:hover{opacity:.88;transform:translateY(-2px)}
.btn2{padding:.8rem 1.8rem;border:1px solid var(--border3);color:var(--muted);font-family:'DM Mono',monospace;font-size:11px;letter-spacing:.1em;text-decoration:none;transition:all .22s;display:inline-flex;align-items:center;gap:.5rem}
.btn2:hover{border-color:var(--text);color:var(--text)}

@keyframes fadeUp{from{opacity:0;transform:translateY(24px)}to{opacity:1;transform:translateY(0)}}

/* terminal */
.right{opacity:0;animation:fadeUp .8s ease .55s forwards}
.term{background:rgba(17,17,20,.97);border:1px solid var(--border2);width:100%;font-family:'DM Mono',monospace;font-size:13px;overflow:hidden;box-shadow:0 0 0 1px rgba(255,255,255,.04),0 24px 64px rgba(0,0,0,.7)}
.tbar{padding:.65rem 1rem;background:var(--bg2);border-bottom:1px solid var(--border);display:flex;align-items:center;gap:.5rem}
.tdot{width:10px;height:10px;border-radius:50%}
.dr{background:#ff6058}.dy{background:#ffbd2e}.dg{background:#29cc41}
.ttitle{margin:0 auto;font-size:11px;color:var(--subtle);letter-spacing:.04em}
.tbody{padding:1.25rem 1.5rem;line-height:2.2;min-height:220px}
.tp{color:var(--green)}.tc{color:var(--text)}.tk{color:var(--accent)}.tv{color:var(--accent2)}.ts{color:var(--pink)}.te{color:#ff6058}
.cur{display:inline-block;width:8px;height:14px;background:var(--green);vertical-align:middle;animation:blink 1.1s step-end infinite}
@keyframes blink{50%{opacity:0}}

/* responsive */
@media(max-width:900px){
  body{overflow:auto;align-items:flex-start}
  .container{grid-template-columns:1fr;gap:3rem}
  .right{display:none}
  main{padding:3rem 1.5rem}
}
@media(max-width:480px){
  .actions{flex-direction:column}
  .btn1,.btn2{justify-content:center}
}
</style>
</head>
<body>

<div class="bg-wrap">
  <div class="orb orb1"></div>
  <div class="orb orb2"></div>
  <div class="orb orb3"></div>
</div>
<div class="scanlines"></div>

<main>
  <div class="container">

    <div class="left">
      <div class="eyebrow">Error 404</div>
      <div class="big404">404<span class="big404-fill">404</span></div>
      <h1 class="headline">Host not<br><em>found.</em></h1>
      <p class="sub">Looks like this path doesn't resolve. The page you're looking for may have been moved, renamed, or never existed.</p>
      <div class="actions">
        <a href="index.html" class="btn1">&#8594;&nbsp; Go Home</a>
      </div>
    </div>

    <div class="right">
      <div class="term">
        <div class="tbar">
          <div class="tdot dr"></div><div class="tdot dy"></div><div class="tdot dg"></div>
          <span class="ttitle">sanjay@sysops ~ bash</span>
        </div>
        <div class="tbody" id="termBody"></div>
      </div>
    </div>

  </div>
</main>

<script>
(function(){
  var lines=[
    {t:'prompt',v:'&#8594; '},
    {t:'cmd',v:'ping sanjaykarki.com.np/this-page'},
    {t:'out',v:'<span class="te">ping: cannot resolve host: Name or service not known</span>'},
    {t:'gap'},
    {t:'prompt',v:'&#8594; '},
    {t:'cmd',v:'curl -I https://sanjaykarki.com.np/this-page'},
    {t:'kv',k:'HTTP/2',v:'404 Not Found',isErr:true},
    {t:'kv',k:'server',v:'SK.sys/2.6'},
    {t:'kv',k:'x-hint',v:'"try / instead"',isStr:true},
    {t:'gap'},
    {t:'prompt',v:'&#8594; '},
    {t:'cmd',v:'traceroute --to home'},
    {t:'out',v:'<span class="tv">1  index.html &nbsp;&nbsp;&nbsp; 0.4ms </span>'},
    {t:'gap'},
    {t:'prompt',v:'&#8594; '},
    {t:'cmd',v:'cd ~'},
  ];

  var tb=document.getElementById('termBody');
  if(!tb) return;
  var rendered='';
  var cursor='<span class="cur"></span>';

  function renderLines(idx){
    if(idx>=lines.length){tb.innerHTML=rendered+'<div><span class="tp">&#8594;</span> '+cursor+'</div>';return;}
    var l=lines[idx];
    if(l.t==='prompt'){rendered+='<div><span class="tp">'+l.v+'</span>';return renderLines(idx+1);}
    if(l.t==='cmd'){rendered+='<span class="tc">'+l.v+'</span></div>';tb.innerHTML=rendered+cursor;}
    else if(l.t==='out'){rendered+='<div style="margin-left:1rem;color:#c8c4bd">'+l.v+'</div>';}
    else if(l.t==='kv'){
      var val=l.isErr?'<span class="te">'+l.v+'</span>':l.isStr?'<span class="ts">'+l.v+'</span>':'<span class="tv">'+l.v+'</span>';
      rendered+='<div style="margin-left:1rem"><span class="tk">'+l.k+'</span>: '+val+'</div>';
    }else if(l.t==='gap'){rendered+='<div style="margin-top:.35rem"></div>';}
    tb.innerHTML=rendered;
    setTimeout(function(){renderLines(idx+1);},idx===0?0:35);
  }

  setTimeout(function(){renderLines(0);},900);
}());
</script>
</body>
</html>
