<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<meta property="og:title" content="Sanjay Karki - Server Administrator">
<meta property="og:description" content="Infrastructure specialist. VMware, Linux, Azure, Windows, 6+ years in IT.">
<meta property="og:type" content="website">

<link rel="preconnect" href="https://fonts.googleapis.com">

<link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;500;600;700;800&family=DM+Mono:wght@300;400;500&family=Lora:ital,wght@0,400;1,400&display=swap" rel="stylesheet">
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{
  --bg:#0c0c0e;--bg2:#111114;
  --border:rgba(255,255,255,0.07);--border2:rgba(255,255,255,0.14);--border3:rgba(255,255,255,0.22);
  --text:#f0ede8;--muted:#8a8a96;--subtle:#5a5a66;
  --accent:#e8c97a;--accent2:#7ab4e8;--green:#7ae8b4;--pink:#e87a9a;
}
html,body{height:100%}
body{background:var(--bg);color:var(--text);font-family:'Syne',sans-serif;line-height:1.6;overflow:hidden}
.hero{height:100vh;display:grid;grid-template-columns:1fr 1fr;align-items:center;padding:4rem;position:relative;overflow:hidden;gap:4rem}
.hero-bg{position:absolute;inset:0;pointer-events:none;overflow:hidden}
.hero-bg-orb{position:absolute;border-radius:50%;filter:blur(80px);opacity:.12}
.orb1{width:500px;height:500px;background:var(--accent);top:-10%;right:-5%}
.orb2{width:300px;height:300px;background:var(--accent2);bottom:10%;left:-5%}
.orb3{width:200px;height:200px;background:var(--pink);top:40%;right:20%}
.hero-left{position:relative;z-index:1}
.eyebrow{font-family:'DM Mono',monospace;font-size:11px;color:var(--accent);letter-spacing:.22em;text-transform:uppercase;margin-bottom:1.5rem;display:flex;align-items:center;gap:.75rem}
.eyebrow::before{content:'';display:block;width:28px;height:1px;background:var(--accent)}
.hname{font-size:clamp(54px,7.5vw,100px);font-weight:800;line-height:.93;letter-spacing:-.03em;margin-bottom:1.35rem}
.hname em{font-style:normal;color:transparent;-webkit-text-stroke:1.5px var(--accent);display:block}
.htagline{font-family:'Lora',serif;font-size:clamp(15px,1.6vw,17px);color:var(--muted);font-style:italic;line-height:1.8;max-width:440px;margin-bottom:2.5rem}
.hactions{display:flex;gap:1rem;flex-wrap:wrap;margin-bottom:3rem}
.btn1{padding:.8rem 1.8rem;background:var(--accent);color:var(--bg);font-family:'DM Mono',monospace;font-size:11px;font-weight:500;letter-spacing:.1em;text-decoration:none;transition:all .22s;display:inline-flex;align-items:center;gap:.5rem}
.btn1:hover{opacity:.88;transform:translateY(-2px)}
.btn2{padding:.8rem 1.8rem;border:1px solid var(--border3);color:var(--muted);font-family:'DM Mono',monospace;font-size:11px;letter-spacing:.1em;text-decoration:none;transition:all .22s;display:inline-flex;align-items:center;gap:.5rem}
.btn2:hover{border-color:var(--text);color:var(--text)}
.hpills{display:flex;flex-wrap:wrap;gap:.5rem}
.hpill{font-family:'DM Mono',monospace;font-size:10px;padding:.28rem .7rem;background:rgba(232,201,122,.08);color:var(--accent);border:1px solid rgba(232,201,122,.18);letter-spacing:.06em}
.hero-right{display:flex;align-items:center;justify-content:center;position:relative;z-index:1}
.term{background:rgba(17,17,20,.95);border:1px solid var(--border2);width:100%;max-width:440px;font-family:'DM Mono',monospace;font-size:13px;overflow:hidden;box-shadow:0 0 0 1px rgba(255,255,255,.04),0 24px 64px rgba(0,0,0,.6)}
.tbar{padding:.65rem 1rem;background:var(--bg2);border-bottom:1px solid var(--border);display:flex;align-items:center;gap:.5rem}
.dot{width:10px;height:10px;border-radius:50%}
.dr{background:#ff6058}.dy{background:#ffbd2e}.dg{background:#29cc41}
.ttitle{margin:0 auto;font-size:11px;color:var(--subtle);letter-spacing:.04em}
.tbody{padding:1.25rem 1.5rem;line-height:2.1}
.tp{color:var(--green)}.tc{color:var(--text)}.tk{color:var(--accent)}.tv{color:var(--accent2)}.ts{color:var(--pink)}
.cur{display:inline-block;width:8px;height:14px;background:var(--green);vertical-align:middle;animation:blink 1.1s step-end infinite}
@keyframes blink{50%{opacity:0}}
</style>
</head>
<body>
<section class="hero">
  <div class="hero-bg">
    <div class="hero-bg-orb orb1"></div>
    <div class="hero-bg-orb orb2"></div>
    <div class="hero-bg-orb orb3"></div>
  </div>
  <div class="hero-left">
    <div class="eyebrow">Server Administrator</div>
    <h1 class="hname">Sanjay<em>Karki</em></h1>
    <p class="htagline">Infrastructure specialist at Heidelberg Materials – building, operating, and supporting VMware, Windows, Linux, &amp; Azure environments at enterprise scale from Brno, Czechia.</p>
    <div class="hactions">
      <a href="https://www.linkedin.com/in/karkisanjay/" class="btn1">&#8594;&nbsp; Connect on LinkedIn</a>
      <!-- <a href="#" class="btn2">&#8594;&nbsp; Contact Me</a> -->
    </div>
    <div class="hpills">
      <span class="hpill">VMware</span>
      <span class="hpill">Linux</span>
      <span class="hpill">Windows</span>
      <span class="hpill">Azure</span>
      <span class="hpill">ITIL</span>
      <span class="hpill">NetApp</span>
      <span class="hpill">QNAP</span>
    </div>
  </div>
  <div class="hero-right">
    <div class="term">
      <div class="tbar">
        <div class="dot dr"></div>
        <div class="dot dy"></div>
        <div class="dot dg"></div>
        <span class="ttitle">sanjay@sysops ~ bash</span>
      </div>
      <div class="tbody" id="termBody"></div>
    </div>
  </div>
</section>
<script>
(function(){
  var lines=[
    {t:'prompt',v:'&#8594; '},{t:'cmd',v:'whoami'},
    {t:'out',v:'sanjay_karki'},{t:'gap'},
    {t:'prompt',v:'&#8594; '},{t:'cmd',v:'cat profile.json'},
    {t:'out',v:'{'},
    {t:'kv',k:'"role"',v:'"Server Administrator"',c:true},
    {t:'kv',k:'"employer"',v:'"Heidelberg Materials"',c:true},
    {t:'kv',k:'"location"',v:'"Brno, Czechia"',c:true},
    {t:'kv',k:'"exp_years"',v:'6',isnum:true,c:true},
    {t:'kv',k:'"open_to_work"',v:'true',isnum:true},
    {t:'out',v:'}'},{t:'gap'},
    {t:'prompt',v:'&#8594; '},{t:'cmd',v:'uptime -p'},
    {t:'out',v:'<span style="color:#7ae8b4">up 6 years</span>'}
  ];
  var tb=document.getElementById('termBody');
  if(!tb) return;
  var cursor='<span class="cur"></span>';
  var rendered='';
  function renderLines(idx){
    if(idx>=lines.length){tb.innerHTML=rendered+'\n<div><span class="tp">&#8594;</span> '+cursor+'</div>';return;}
    var l=lines[idx];
    if(l.t==='prompt'){rendered+='<div><span class="tp">'+l.v+'</span>';return renderLines(idx+1);}
    if(l.t==='cmd'){rendered+='<span class="tc">'+l.v+'</span></div>';tb.innerHTML=rendered+cursor;}
    else if(l.t==='out'){rendered+='<div style="margin-left:1rem;color:#c8c4bd">'+l.v+'</div>';}
    else if(l.t==='kv'){
      var val=l.isnum?'<span class="tv">'+l.v+'</span>':'<span class="ts">'+l.v+'</span>';
      rendered+='<div style="margin-left:2rem"><span class="tk">'+l.k+'</span>: '+val+(l.c?',':'')+'</div>';
    }else if(l.t==='gap'){rendered+='<div style="margin-top:.4rem"></div>';}
    tb.innerHTML=rendered;
    setTimeout(function(){renderLines(idx+1);},30);
  }
  setTimeout(function(){renderLines(0);},600);
}());
</script>
</body>
</html>
